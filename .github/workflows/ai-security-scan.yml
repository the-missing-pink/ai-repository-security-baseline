# AI Security Scan — Primary CI Security Pipeline
#
# This workflow runs on trusted branches and collaborator PRs.
# It performs secret scanning, SAST, SCA, lockfile integrity checks,
# and AI commit attribution auditing.
#
# SHA Pinning Policy:
#   All third-party actions MUST be pinned by full commit SHA.
#   Human-readable version is noted in a comment for auditability.
#   To update: verify the new SHA against the action's repository,
#   check the release notes for breaking changes, and update both
#   the SHA and the version comment.
#
# [PLACEHOLDER — Update all SHA pins to the latest verified versions
#  before enabling this workflow. The SHAs below are examples.]

name: AI Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Top-level least-privilege permissions — jobs override as needed
permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------
  # Job 1: Secret Scanning
  # Detects committed secrets using TruffleHog
  # -------------------------------------------------------------------
  secret-scan:
    name: Secret Scanning (TruffleHog)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@17456f8c7d042d8c82c9a8ca9e937231f9f42e26  # v3.95.2
        with:
          extra_args: --only-verified --results=verified

  # -------------------------------------------------------------------
  # Job 2: SAST — CodeQL
  # GitHub's native static analysis for supported languages
  # -------------------------------------------------------------------
  sast-codeql:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    # NOTE: This job requires source code in the configured language(s).
    # As a template repo with no application code, CodeQL will fail with
    # "no source code seen during build". Set continue-on-error so it
    # doesn't block the PR. Remove this once you add application code.
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        # [PLACEHOLDER — Set to your project's languages]
        # Supported: javascript, typescript, python, go, java, csharp, cpp, ruby, swift
        language: ['javascript']
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@ce28f5bb42b7a9f2c824e633a3f6ee835bab6858  # v3.28.16
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@ce28f5bb42b7a9f2c824e633a3f6ee835bab6858  # v3.28.16

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@ce28f5bb42b7a9f2c824e633a3f6ee835bab6858  # v3.28.16
        with:
          category: "/language:${{ matrix.language }}"

  # -------------------------------------------------------------------
  # Job 3: SAST — Semgrep
  # Cross-language static analysis with OWASP and secrets rulesets
  # -------------------------------------------------------------------
  sast-semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      # [PLACEHOLDER — Pin to a specific Semgrep image digest]
      image: semgrep/semgrep
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/default \
            --config p/owasp-top-ten \
            --config p/secrets \
            --exclude '.github/workflows/untrusted-pr.yml' \
            --sarif --output=semgrep-results.sarif \
            --error \
            --severity ERROR
        env:
          # [PLACEHOLDER — Set SEMGREP_APP_TOKEN if using Semgrep Cloud]
          SEMGREP_RULES: "p/default p/owasp-top-ten p/secrets"

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@ce28f5bb42b7a9f2c824e633a3f6ee835bab6858  # v3.28.16
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  # -------------------------------------------------------------------
  # Job 4: SCA — Dependency Review
  # Checks for vulnerable or license-incompatible dependencies
  # -------------------------------------------------------------------
  sca:
    name: Dependency Review (SCA)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    # NOTE: This job requires Dependency Graph to be enabled on the repository.
    # For private repos, this also requires GitHub Advanced Security (GHAS).
    # Enable at: Settings → Code security → Dependency graph.
    # If not available, this job will fail gracefully without blocking the PR.
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@da24556b548a50705dd671f47852072ea4c105d9  # v4.7.1
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
          # [PLACEHOLDER — Add denied licenses if needed]
          # deny-licenses: GPL-3.0, AGPL-3.0

  # -------------------------------------------------------------------
  # Job 5: Lockfile Integrity
  # Verifies that lockfiles are consistent with manifests
  # -------------------------------------------------------------------
  lockfile-check:
    name: Lockfile Integrity
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      # [PLACEHOLDER — Uncomment and configure for your package manager]
      #
      # Node.js (npm):
      # - name: Verify npm lockfile
      #   run: npm ci --ignore-scripts
      #
      # Node.js (pnpm):
      # - name: Verify pnpm lockfile
      #   run: pnpm install --frozen-lockfile
      #
      # Python (pip):
      # - name: Verify pip requirements
      #   run: pip install --dry-run --require-hashes -r requirements.txt
      #
      # Go:
      # - name: Verify go.sum
      #   run: go mod verify

      - name: Lockfile check placeholder
        run: echo "Configure lockfile verification for your package manager. See comments above."

  # -------------------------------------------------------------------
  # Job 6: AI Commit Attribution Audit
  # Verifies AI-authored commits have proper trailers (advisory)
  # -------------------------------------------------------------------
  ai-commit-audit:
    name: AI Commit Attribution Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check AI-authored commits for trailers
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          echo "Checking for AI-authored commits without attribution trailers..."
          echo ""

          # Known AI agent email patterns
          # [PLACEHOLDER — Add your project's AI agent email patterns]
          AI_PATTERNS="noreply@anthropic|github-actions|copilot|cursor|codeium|devin|aider"

          # Find commits from AI agents in this PR
          COMMITS=$(git log --format='%H %ae' "origin/$BASE_REF..HEAD" 2>/dev/null || true)

          ISSUES=0
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            HASH=$(echo "$line" | awk '{print $1}')
            EMAIL=$(echo "$line" | awk '{print $2}')

            if echo "$EMAIL" | grep -qiE "$AI_PATTERNS"; then
              # Check for attribution trailer
              BODY=$(git log -1 --format='%B' "$HASH")
              if ! echo "$BODY" | grep -qiE "(Assisted-by|Co-Authored-By):"; then
                echo "::warning::Commit $HASH by $EMAIL is missing an Assisted-by or Co-Authored-By trailer"
                ISSUES=$((ISSUES + 1))
              fi
            fi
          done <<< "$COMMITS"

          if [ "$ISSUES" -gt 0 ]; then
            echo ""
            echo "Found $ISSUES AI-authored commit(s) without attribution trailers."
            echo "See AGENTS.md §6.4 for the commit attribution policy."
          else
            echo "All AI-authored commits have proper attribution trailers (or no AI commits found)."
          fi
